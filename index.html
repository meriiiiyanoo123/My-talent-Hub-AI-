<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentHub AI - لوحة التحكم</title>
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body { background-color: #f4f6f9; font-family: system-ui, -apple-system, sans-serif; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 16px; }
        .btn-primary { background-color: #0284c7; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="#">🚀 TalentHub AI</a>
            <span class="badge bg-success">لوحة التحكم الذكية</span>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <!-- الرفع -->
            <div class="col-lg-5">
                <div class="card p-4 bg-white">
                    <h5 class="fw-bold mb-4">تصفية طلب جديد</h5>
                    <div class="mb-3">
                        <label class="form-label fw-bold">الوصف الوظيفي للمؤسسة:</label>
                        <textarea id="jobDesc" class="form-control" rows="5" placeholder="أدخل متطلبات الوظيفة هنا..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">اختر ملف الـ CV (PDF):</label>
                        <input type="file" id="cvFile" class="form-control" accept=".pdf">
                    </div>
                    <button onclick="startAIScreening()" class="btn btn-primary w-100 py-2 fw-bold">ابدأ الفرز الفوري</button>
                </div>
            </div>

            <!-- النتائج -->
            <div class="col-lg-7">
                <div class="card p-4 bg-white" id="resultCard" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0">نتيجة التحليل التلقائي</h5>
                        <span id="matchScore" class="badge bg-primary p-3 fs-5 rounded-pill">0%</span>
                    </div>
                    <div class="mb-3">
                        <h6 class="fw-bold text-success">📝 تقرير المستشار الذكي:</h6>
                        <p id="aiSummary" class="bg-light p-3 rounded text-muted"></p>
                    </div>
                    <div class="row">
                        <div class="col-6">
                            <h6 class="fw-bold text-success">✓ مهارات متوفرة:</h6>
                            <ul id="strengthsList" class="text-success list-unstyled fw-semibold"></ul>
                        </div>
                        <div class="col-6">
                            <h6 class="fw-bold text-danger">✗ مهارات مفقودة:</h6>
                            <ul id="missingList" class="text-danger list-unstyled fw-semibold"></ul>
                        </div>
                    </div>
                </div>

                <div class="card p-5 text-center text-muted" id="placeholderCard">
                    <p id="statusText" class="m-0">انتظار رفع الملفات لبدء الفرز الآلي...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function startAIScreening() {
            const fileInput = document.getElementById('cvFile');
            const jobDesc = document.getElementById('jobDesc').value;
            
            if(!fileInput.files[0] || !jobDesc) {
                alert("الرجاء تعبئة الوصف ورفع الـ CV أولاً!");
                return;
            }

            document.getElementById('statusText').innerText = "جاري قراءة الملف وإرساله لـ Claude AI للفرز...";

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("job_description", jobDesc);

            try {
                const response = await fetch("/api/candidates/upload", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                if (data.error) {
                    alert("خطأ من السيرفر: " + data.error);
                    document.getElementById('statusText').innerText = "فشل الفرز: " + data.error;
                    return;
                }
                
                document.getElementById('placeholderCard').style.display = 'none';
                document.getElementById('resultCard').style.display = 'block';
                
                document.getElementById('matchScore').innerText = data.match_score + "%";
                document.getElementById('aiSummary').innerText = data.summary;
                
                document.getElementById('strengthsList').innerHTML = data.strengths.map(s => `<li>• ${s}</li>`).join('');
                document.getElementById('missingList').innerHTML = data.missing.map(m => `<li>• ${m}</li>`).join('');
            } catch (error) {
                document.getElementById('statusText').innerText = "حدث خطأ بالاتصال. تأكد من إعداد رمز الـ API بنجاح.";
            }
        }
    </script>
</body>
</html>
